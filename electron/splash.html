<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TigerClawDockerManager</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0d1117;
        color: #e6edf3;
        font-family: system-ui, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }
      .root {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 28px 24px 32px;
      }
      .logo {
        width: 220px;
        height: 220px;
        object-fit: contain;
        display: block;
        filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.45));
      }
      .title {
        margin-top: 20px;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.02em;
        opacity: 0.95;
      }
      .hint {
        margin-top: 10px;
        font-size: 12px;
        opacity: 0.55;
      }
    </style>
  </head>
  <body>
    <div class="root">
      <img class="logo" src="icon.png" alt="" width="220" height="220" />
      <div class="title">TigerClawDockerManager</div>
      <div class="hint">Starting…</div>
    </div>
  </body>
</html>
